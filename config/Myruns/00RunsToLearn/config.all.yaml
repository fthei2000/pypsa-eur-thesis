#Hi
run:
  name: "all-europe-sector-smoke"
  disable_progressbar: true
  shared_resources:
    policy: false

scenario:
  clusters: [41]          # erst 1 Cluster-Level!
  opts: ['']              # baseline
  sector_opts: ['']       # baseline sector settings
  planning_horizons: [2050]

countries: ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR','HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT','RO','RS','SE','SI','SK','UA','XK']

# 1 Woche zum Testen (größter Performance-Hebel)
snapshots:
  start: "2013-01-01"
  end:   "2013-01-08"

# Electricity
electricity:
  co2limit_enable: false        # für Smoke-Test aus
  extendable_carriers:
    Generator: [solar, onwind, offwind-ac, offwind-dc, OCGT, CCGT]
    StorageUnit: [battery]
    Store: [H2]
    Link: [H2 Electrolysis, H2 Fuel Cell]

# Sector coupling: minimal aber “echt”
sector:
  biomass: true
  industry: true

# Lines
lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false            # DLR ist teuer -> später

# Solving (für den ersten Smoke-Test kannst du auch solving erstmal überspringen)
solving:
  solver:
    name: gurobi
    options: gurobi-default
  solver_options:
    gurobi-default:
      threads: 8
      method: 2
      crossover: 0

data:
  wdpa:
    source: primary
    version: latest
  wdpa_marine:
    source: primary
    version: latest
      
