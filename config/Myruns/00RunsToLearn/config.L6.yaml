# ==========================================
# L6 FULL SPATIAL (2050, 24H)
# L5 generation realism + country-level CO2 storage costs + extra generation technologies
# ==========================================

run:
  name: "L6-myopic-2030-2050-country-storage"
  disable_progressbar: true
  shared_resources:
    policy: false

foresight: myopic

scenario:
  clusters: [96]
  opts: ['Co2L']
  sector_opts: ['24h']
  planning_horizons: [2030, 2040, 2050]

countries:
  ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR',
   'HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT',
   'RO','RS','SE','SI','SK','UA','XK']

snapshots:
  start: "2019-01-01"
  end: "2020-01-01"
  inclusive: "left"

atlite:
  default_cutout: "europe-2019-era5"
  cutouts:
    "europe-2019-era5":
      module: era5
      x: [-12.0, 42.0]
      y: [33.0, 72.0]
      dx: 0.3
      dy: 0.3
      time: ["2019", "2019"]
      chunks:
        time: 500
      prepare_kwargs:
        monthly_requests: true
        tmpdir: ./cutouts_tmp/

electricity:
  co2limit_enable: false
  transmission_limit: c1.5

  # Extend L5 with firm low-carbon options that are already implemented in this fork.
  extendable_carriers:
    Generator: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, OCGT, CCGT, biomass]
    StorageUnit: [battery]
    Store: [H2]
    Link: []

  conventional_carriers: [nuclear, oil, OCGT, CCGT, coal, lignite, geothermal, biomass]
  renewable_carriers: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, hydro]

  estimate_renewable_capacities:
    enable: true
    from_gem: true
    year: 2020
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar

conventional:
  unit_commitment: false
  dynamic_fuel_price: true
  fuel_price_rolling_window: 6
  nuclear:
    p_max_pu: data/nuclear_p_max_pu.csv
  biomass:
    p_max_pu: 0.65

sector:
  biomass: true
  industry: true
  dac: true
  co2_vent: false
  co2_spatial: true
  co2_network: true
  co2_network_cost_factor: 1.0
  cc_fraction: 0.9

  # Additional generation technologies beyond L5.
  allam_cycle_gas: false
  enhanced_geothermal:
    enable: false

  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25

  # Baseline fallback for countries not listed below.
  co2_sequestration_cost: 20
  co2_sequestration_cost_by_country:
    "AL": 12
    "BE": 7
    "BG": 13
    "DE": 8
    "DK": 6
    "EE": 13
    "ES": 10
    "FI": 12
    "FR": 9
    "GB": 6
    "HR": 11
    "IE": 8
    "IT": 10
    "LT": 13
    "LV": 13
    "ME": 12
    "NL": 6
    "NO": 5
    "PL": 11
    "PT": 11
    "RO": 12
    "SE": 10
    "UA": 12
  co2_sequestration_lifetime: 50

lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false

costs:
  emission_prices:
    enable: true
    dynamic: false
    co2:
      2030: 140
      2040: 180
      2050: 460

solving:
  solver:
    name: gurobi
    options: gurobi-default

  solver_options:
    gurobi-default:
      threads: 8
      method: 2
      crossover: 0
      NumericFocus: 1
      BarConvTol: 1.0e-6
      FeasibilityTol: 1.0e-6

data:
  cutout:
    source: build
    version: unknown
  wdpa:
    source: primary
    version: latest
  wdpa_marine:
    source: primary
    version: latest
