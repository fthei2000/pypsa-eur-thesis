# ==========================================
# L1 – Baseline Lite 2050
# ==========================================

run:
  name: "L1-baseline-lite"
  disable_progressbar: true
  shared_resources:
    policy: false

scenario:
  clusters: [41]
  opts: ['Co2L']          # activate CO2 limit
  sector_opts: ['']
  planning_horizons: [2050]

countries:
  ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR',
   'HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT','RO',
   'RS','SE','SI','SK','UA','XK']

# 1 month (still laptop-feasible)
snapshots:
  start: "2013-01-01"
  end:   "2013-02-01"

# ==========================================
# Electricity
# ==========================================

electricity:
  co2limit_enable: true
  co2limit: 0

  extendable_carriers:
    Generator: [solar, onwind, offwind-ac, offwind-dc, OCGT, CCGT]
    StorageUnit: [battery]
    Store: [H2]
    Link: [H2 Electrolysis, H2 Fuel Cell]

# ==========================================
# Sector coupling
# ==========================================

sector:
  biomass: true
  industry: true

# ==========================================
# Transmission
# ==========================================

lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false

# ==========================================
# Solving
# ==========================================

solving:
  solver:
    name: gurobi
    options: gurobi-default

  solver_options:
    gurobi-default:
      threads: 4          # laptop-safe
      method: 2
      crossover: 0

# ==========================================
# Data
# ==========================================

data:
  wdpa:
    source: primary
    version: latest
  wdpa_marine:
    source: primary
    version: latest