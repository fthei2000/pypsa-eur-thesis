# ==========================================
# L3 SHORT - Carbon System Test (1 Month)
# Safe variant derived from config.all.yaml
# ==========================================

run:
  name: "L3-short-carbon-test"
  disable_progressbar: true
  shared_resources:
    policy: false

scenario:
  clusters: [41]
  opts: ['Co2L']
  sector_opts: ['']
  planning_horizons: [2050]

countries: ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR','HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT','RO','RS','SE','SI','SK','UA','XK']

snapshots:
  start: "2013-01-01"
  end: "2013-02-01"

electricity:
  co2limit_enable: true
  # 0 can become infeasible in short-horizon tests; use a tight but safer cap.
  co2limit: 100.e+6
  extendable_carriers:
    Generator: [solar, onwind, offwind-ac, offwind-dc, OCGT, CCGT]
    StorageUnit: [battery]
    Store: [H2]
    Link: [H2 Electrolysis, H2 Fuel Cell]

sector:
  biomass: true
  industry: true
  dac: true
  cdr_credit_price:
    2025: 0
    2030: 40
    2035: 80
    2040: 120
    2045: 160
    2050: 200
  cdr_credit_scope: ["dac", "biogenic"]
  dac_variants:
    enable: true
    variants:
      lowT:
        carrier_name: DAC-lowT
        capital_cost_multiplier: 1.0
        electricity_input_multiplier: 0.95
        heat_input_multiplier: 1.05
        lifetime_multiplier: 1.0
      solid:
        carrier_name: DAC-solid
        capital_cost_multiplier: 1.2
        electricity_input_multiplier: 0.85
        heat_input_multiplier: 1.25
        lifetime_multiplier: 1.0
  co2_vent: false
  co2_spatial: true
  co2_network: true
  co2_network_cost_factor: 1.0
  cc_fraction: 0.9
  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25
  co2_sequestration_cost: 30
  co2_sequestration_lifetime: 50

lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false

solving:
  solver:
    name: gurobi
    options: gurobi-default
  solver_options:
    gurobi-default:
      threads: 4
      method: 2
      crossover: 0

data:
  wdpa:
    source: primary
    version: latest
  wdpa_marine:
    source: primary
    version: latest
