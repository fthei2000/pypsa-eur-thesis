# ==========================================
# S06 — CDR CREDIT PRICE €300/tCO₂ (flat across all years)
# Supply curve LOW cost scenario (168seg): credit price = €300/tCO₂ for DAC and BECCS.
# Credit demand cap: 100 Mt/yr (2030), 300 Mt/yr (2040), 500 Mt/yr (2050)
# based on NZIA / EC ICM Strategy / CATF recommended market demand levels.
# Planning horizons: 2030, 2040, 2050.
# Each horizon uses its own previous solve as brownfield (2030→2040→2050),
# so CDR capacity built in 2030 is correctly inherited into 2040.
# ==========================================

run:
  name: "S06low-cdr-300eur-168seg"
  disable_progressbar: true
  use_shadow_directory: false
  shared_resources:
    policy: false

foresight: myopic

scenario:
  clusters: [96]
  opts: ['']
  sector_opts: ['168seg']
  planning_horizons: [2030, 2040, 2050]

countries:
  ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR',
   'HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT',
   'RO','RS','SE','SI','SK','UA','XK']

snapshots:
  start: "2019-01-01"
  end: "2020-01-01"
  inclusive: "left"

atlite:
  default_cutout: "europe-2019-era5"
  cutouts:
    "europe-2019-era5":
      module: era5
      x: [-12.0, 42.0]
      y: [33.0, 72.0]
      dx: 0.3
      dy: 0.3
      time: ["2019", "2019"]
      chunks:
        time: 500
      prepare_kwargs:
        monthly_requests: true
        tmpdir: ./cutouts_tmp/

electricity:
  co2limit_enable: false
  transmission_limit: c1.5

  extendable_carriers:
    Generator: [nuclear, solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, OCGT, CCGT, biomass]
    StorageUnit: [battery]
    Store: [H2]
    Link: []

  conventional_carriers: [oil, OCGT, CCGT, coal, lignite, geothermal, biomass]
  renewable_carriers: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, hydro]

  estimate_renewable_capacities:
    enable: true
    from_gem: true
    year: 2020
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar

conventional:
  unit_commitment: false
  dynamic_fuel_price: true
  fuel_price_rolling_window: 6
  nuclear:
    p_max_pu: data/nuclear_p_max_pu.csv
  biomass:
    p_max_pu: 0.65

sector:
  biomass: true
  biomass_transport: true
  industry: true
  dac: true
  dac_variants:
    enable: true
    variants:
      liquid:
        carrier_name: DAC-liquidHT
        cost_technology: direct air capture - liquid
      solid:
        carrier_name: DAC-solidLT
        cost_technology: direct air capture - solid
  dac_weather_factors:
    enable: true
    file: data/dac_country_weather_factors.csv
  cdr_credit_scope: ["dac", "biogenic"]

  # Hard upper bound kept at 9999 Mt (non-binding) to give Gurobi finite variable
  # bounds on CDR variables — required for barrier solver stability.
  cdr_credit_limit_by_year:
    2030: 9999
    2040: 9999
    2050: 9999

  cdr_credit_prices_by_scope:
    dac:
      2025: 300
      2030: 300
      2040: 300
      2050: 300
    biogenic:
      2025: 300
      2030: 300
      2040: 300
      2050: 300

  co2_vent: false
  co2_spatial: true
  co2_network: true
  co2_network_cost_factor:
    2030: 5.0
    2040: 3.0
    2050: 1.5
  cc_fraction: 0.9

  # Credits are issued at geological sequestration, not at capture
  # This prevents overcrediting CO2 that is later re-emitted via e-fuels
  cdr_credit_timing: sequestration

  # Standalone CDR market: DAC/BECCS earn only CDR credit, not CO2 price on top
  cdr_credit_standalone: true

  # EU-ambition CO2 T&S infrastructure ramp-up (Mt CO₂/yr)
  # Consistent with EC CCUS strategy: ~50 Mt by 2030, scaling to ~550 Mt by 2050
  co2_sequestration_potential:
    2025: 10
    2030: 70
    2035: 170
    2040: 320
    2045: 450
    2050: 600

  # Use full ENSPRESO solid biomass potential (~1020 TWh/yr by 2040)
  # Restored after reduced 50% cap made 2040 brownfield solves infeasible
  solid_biomass_potential_factor: 1.0
  # CCS deployment rate limits — prevent unrealistic overnight build-up.
  # Calibrated against EU CCS project pipelines and published transition pathways:
  #   process emissions CC : ~20 MtCO2/yr by 2030, growing to ~60 by 2050
  #   SMR CC               : ~8 MtCO2/yr by 2030 (blue H2); falls naturally
  #                          with higher CDR credit prices
  #   urban central gas    : capped to prevent new fossil gas CHP lock-in in 2050;
  #   CHP CC                 reduces from current ~96 MtCO2/yr to ≤15 MtCO2/yr
  # factor 1.3 is the built-in 30% slack buffer in add_max_growth().
  # Renewable limits are carried over from config.default.yaml defaults.
  limit_max_growth:
    enable: true
    factor: 1.3
    max_growth:
      onwind: 16
      solar: 28
      "solar-hsat": 7
      "solar rooftop": 15
      "offwind-ac": 8
      "offwind-dc": 6
      "process emissions CC": 0.18
      "SMR CC": 0.39
      "urban central gas CHP CC": 0.25
    max_relative_growth:
      onwind: 3
      solar: 3
      "solar-hsat": 3
      "solar rooftop": 3
      "offwind-ac": 3
      "offwind-dc": 3

  allam_cycle_gas: false
  biogas_upgrading_cc: true
  biomass_to_liquid_cc: true
  biosng_cc: true
  bioH2: true
  methanol:
    biomass_to_methanol_cc: true
  enhanced_geothermal:
    enable: false

  regional_co2_sequestration_potential:

    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25

  co2_sequestration_cost: 20
  co2_sequestration_cost_by_country:
    "AL": 12
    "BE": 7
    "BG": 13
    "DE": 8
    "DK": 6
    "EE": 13
    "ES": 10
    "FI": 12
    "FR": 9
    "GB": 6
    "HR": 11
    "IE": 8
    "IT": 10
    "LT": 13
    "LV": 13
    "ME": 12
    "NL": 6
    "NO": 5
    "PL": 11
    "PT": 11
    "RO": 12
    "SE": 10
    "UA": 12
  co2_sequestration_lifetime: 50

co2_budget: null  # No hard CO2 cap — CDR deploys on market economics, not mandate

clustering:
  temporal:
    resolution_elec: false
    resolution_sector: "168seg"

lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false

costs:
  custom_cost_fn: data/costs/custom_costs_low.csv
  emission_prices:
    enable: true
    dynamic: false
    co2:
      2030: 119
      2040: 279
      2050: 463

solving:
  options:
    io_api: mps
  agg_p_nom_limits:
    agg_offwind: false
    agg_solar: false
    include_existing: false
    file: config/Myruns/supply_curve_v2/nuclear_p_nom_limits.csv
  constraints:
    CCL: true
    EQ: false
    BAU: false
    SAFE: false
  solver:
    name: gurobi
    options: gurobi-default

  solver_options:
    gurobi-default:
      threads: 8
      method: 2
      crossover: 0
      NumericFocus: 3
      BarHomogeneous: 1
      DualReductions: 0
      InfUnbdInfo: 1
      ScaleFlag: 2
      ObjScale: -0.5
      BarConvTol: 1.0e-5
      FeasibilityTol: 1.0e-5
      OptimalityTol: 1.0e-5
      Seed: 123
      GURO_PAR_BARDENSETHRESH: 200
      TimeLimit: 172800

data:
  cutout:
    source: build
    version: unknown
  wdpa:
    source: archive
    version: latest
  wdpa_marine:
    source: archive
    version: latest
