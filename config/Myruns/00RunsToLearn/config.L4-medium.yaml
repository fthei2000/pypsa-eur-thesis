# ==========================================
# L4 MEDIUM RUN (2050)
# Between L4-fast and full L4
# ==========================================

run:
  name: "L4-medium"
  disable_progressbar: true
  shared_resources:
    policy: false

scenario:
  clusters: [52]
  opts: ['Co2L']
  # Keep daily temporal aggregation for moderate runtime
  sector_opts: ['24h']
  planning_horizons: [2050]

countries:
  ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR',
   'HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT',
   'RO','RS','SE','SI','SK','UA','XK']

# Adjustment 1: move closer to full L4 by using full-year snapshots
snapshots:
  start: "2013-01-01"
  end: "2014-01-01"
  inclusive: "left"

electricity:
  co2limit_enable: true
  # Tighter than fast, looser than full net-zero
  co2limit: 5.e+6

  extendable_carriers:
    Generator: [solar, onwind, offwind-ac, offwind-dc, OCGT, CCGT, biomass]
    StorageUnit: [battery]
    Store: [H2]
    Link: []

sector:
  biomass: true
  industry: true
  dac: true
  co2_vent: false
  co2_spatial: true
  # Keep disabled for medium runtime
  co2_network: false
  co2_network_cost_factor: 1.0
  cc_fraction: 0.9

  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25

  co2_sequestration_cost: 20
  co2_sequestration_lifetime: 50

lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false

solving:
  solver:
    name: gurobi
    options: gurobi-default

  solver_options:
    gurobi-default:
      threads: 8
      method: 2
      crossover: 0
      BarConvTol: 1.0e-6
      FeasibilityTol: 1.0e-6

data:
  wdpa:
    source: primary
    version: latest
  wdpa_marine:
    source: primary
    version: latest
