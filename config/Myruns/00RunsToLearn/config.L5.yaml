# ==========================================
# L5 FULL SPATIAL (2050, 24H)
# L4 baseline setup + explicit generation realism across Europe
# ==========================================

run:
  name: "L5-full-spatial-24h-generation-realism"
  disable_progressbar: true
  shared_resources:
    policy: false

scenario:
  clusters: [96]
  opts: ['Co2L']
  sector_opts: ['24h']
  planning_horizons: [2050]

countries:
  ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR',
   'HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT',
   'RO','RS','SE','SI','SK','UA','XK']

snapshots:
  start: "2019-01-01"
  end: "2020-01-01"
  inclusive: "left"

atlite:
  default_cutout: "europe-2019-era5"
  cutouts:
    "europe-2019-era5":
      module: era5
      x: [-12.0, 42.0]
      y: [33.0, 72.0]
      dx: 0.3
      dy: 0.3
      time: ["2019", "2019"]
      chunks:
        time: 500
      prepare_kwargs:
        monthly_requests: true
        tmpdir: ./cutouts_tmp/

electricity:
  co2limit_enable: true
  co2limit: 0

  # Keep all key utility-scale technologies active for pan-European realism.
  extendable_carriers:
    Generator: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, OCGT, CCGT, biomass]
    StorageUnit: [battery]
    Store: [H2]
    Link: []

  # Explicitly retain full conventional and renewable carrier sets.
  conventional_carriers: [nuclear, oil, OCGT, CCGT, coal, lignite, geothermal, biomass]
  renewable_carriers: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, hydro]

  # Calibrate installed renewable capacities to a harmonised European base year.
  estimate_renewable_capacities:
    enable: true
    from_gem: true
    year: 2020
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar

conventional:
  unit_commitment: false
  dynamic_fuel_price: true
  fuel_price_rolling_window: 6
  nuclear:
    p_max_pu: data/nuclear_p_max_pu.csv
  biomass:
    p_max_pu: 0.65

sector:
  biomass: true
  industry: true
  dac: true
  cdr_credit_price: 0.0
  cdr_credit_scope: ["dac", "biogenic"]
  co2_vent: false
  co2_spatial: true
  co2_network: true
  co2_network_cost_factor: 1.0
  cc_fraction: 0.9

  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25

  co2_sequestration_cost: 20
  co2_sequestration_lifetime: 50

lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false

solving:
  solver:
    name: gurobi
    options: gurobi-default

  solver_options:
    gurobi-default:
      threads: 8
      method: 2
      crossover: 0
      NumericFocus: 1
      BarConvTol: 1.0e-6
      FeasibilityTol: 1.0e-6

data:
  cutout:
    source: build
    version: unknown
  wdpa:
    source: primary
    version: latest
  wdpa_marine:
    source: primary
    version: latest
