# Reduced supply-curve run generated from config/Myruns/supply_curve.
# Resolution: 41 clusters, 24seg; Gurobi crossover disabled.
# Use for relative S0-vs-credit-price comparisons, not absolute capacity planning.
# ==========================================
# S0 — BASELINE (No CDR Revenue Signal)
# L7 infrastructure (DAC variants, CO2 network, spatial CO2) with zero CDR credit.
# CDR can deploy only if cost-competitive under ETS price alone.
# Purpose: left anchor of supply curve — counterfactual CDR deployment at €0 revenue.
# ==========================================

run:
  name: "S0-no-cdr-revenue-r41-24seg"
  disable_progressbar: true
  shared_resources:
    policy: false

foresight: myopic

scenario:
  clusters: [41]
  opts: ['']
  sector_opts: ['24seg']
  planning_horizons: [2030, 2040, 2050]

countries:
  ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR',
   'HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT',
   'RO','RS','SE','SI','SK','UA','XK']

snapshots:
  start: "2019-01-01"
  end: "2020-01-01"
  inclusive: "left"

atlite:
  default_cutout: "europe-2019-era5"
  cutouts:
    "europe-2019-era5":
      module: era5
      x: [-12.0, 42.0]
      y: [33.0, 72.0]
      dx: 0.3
      dy: 0.3
      time: ["2019", "2019"]
      chunks:
        time: 500
      prepare_kwargs:
        monthly_requests: true
        tmpdir: ./cutouts_tmp/

electricity:
  co2limit_enable: false
  transmission_limit: c1.5

  extendable_carriers:
    Generator: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, OCGT, CCGT, biomass]
    StorageUnit: [battery]
    Store: [H2]
    Link: []

  conventional_carriers: [oil, OCGT, CCGT, coal, lignite, geothermal, biomass]
  renewable_carriers: [solar, solar-hsat, onwind, offwind-ac, offwind-dc, offwind-float, hydro]

  estimate_renewable_capacities:
    enable: true
    from_gem: true
    year: 2020
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar

conventional:
  unit_commitment: false
  dynamic_fuel_price: true
  fuel_price_rolling_window: 6
  nuclear:
    p_max_pu: data/nuclear_p_max_pu.csv
  biomass:
    p_max_pu: 0.65

sector:
  biomass: true
  industry: true
  dac: true
  dac_variants:
    enable: true
    variants:
      liquid:
        carrier_name: DAC-liquidHT
        cost_technology: direct air capture - liquid
      solid:
        carrier_name: DAC-solidLT
        cost_technology: direct air capture - solid
      electrochemical:
        carrier_name: DAC-electrochemical
        cost_technology: direct air capture - electrochemical
  # No CDR credit price or issuance cap in S0.
  # No CDR market exists, so DAC/BECCS earn ETS revenue normally (standalone: false).
  co2_vent: false
  co2_spatial: true
  co2_network: true
  co2_network_cost_factor:
    2030: 5.0
    2040: 3.0
    2050: 1.5
  cc_fraction: 0.9

  cdr_credit_scope: ["dac", "biogenic"]

  # S0 has zero credit price — no solve-time provenance tracking needed.
  # Capture timing activates the build-time ETS cancellation fallback in
  # prepare_sector_network.py (lines 1511-1516), which applies the same
  # standalone logic via marginal_cost without adding tracking variables.
  cdr_credit_timing: capture

  # Standalone market: DAC/BECCS earn only CDR credit, not ETS on top
  # Same as S01-S10 so S0 is a clean €0 left anchor
  cdr_credit_standalone: true

  # EU-ambition CO2 T&S infrastructure ramp-up (Mt CO₂/yr)
  # Consistent with EC CCUS strategy: ~50 Mt by 2030, scaling to ~550 Mt by 2050
  co2_sequestration_potential:
    2025: 50
    2030: 150
    2035: 275
    2040: 400
    2045: 700
    2050: 1000

  # Use full ENSPRESO solid biomass potential (~1020 TWh/yr by 2040)
  # Restored after reduced 50% cap made 2040 brownfield solves infeasible
  solid_biomass_potential_factor: 0.75
  allam_cycle_gas: false
  enhanced_geothermal:
    enable: false

  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25

  co2_sequestration_cost: 20
  co2_sequestration_cost_by_country:
    "AL": 12
    "BE": 7
    "BG": 13
    "DE": 8
    "DK": 6
    "EE": 13
    "ES": 10
    "FI": 12
    "FR": 9
    "GB": 6
    "HR": 11
    "IE": 8
    "IT": 10
    "LT": 13
    "LV": 13
    "ME": 12
    "NL": 6
    "NO": 5
    "PL": 11
    "PT": 11
    "RO": 12
    "SE": 10
    "UA": 12
  co2_sequestration_lifetime: 50

co2_budget: null  # No hard CO2 cap — CDR deploys on market economics, not mandate

clustering:
  temporal:
    resolution_elec: false
    resolution_sector: "24seg"

lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false

costs:
  overwrites:
    compression-electricity-input:
      biomass CHP capture: 0.16
    electricity-input:
      biomass CHP capture: 0.025
  emission_prices:
    enable: true
    dynamic: false
    co2:
      2030: 140
      2040: 180
      2050: 460

solving:
  options:
    io_api: mps
  solver:
    name: gurobi
    options: gurobi-default

  solver_options:
    gurobi-default:
      threads: 8
      method: 2
      crossover: 0
      NumericFocus: 3
      BarHomogeneous: 1
      ScaleFlag: 2
      ObjScale: -0.5
      BarConvTol: 1.0e-5
      FeasibilityTol: 1.0e-5
      OptimalityTol: 1.0e-5
      Seed: 123
      GURO_PAR_BARDENSETHRESH: 200
      TimeLimit: 43200

data:
  cutout:
    source: build
    version: unknown
  wdpa:
    source: archive
    version: latest
  wdpa_marine:
    source: archive
    version: latest
