# ==========================================
# L4 FULL SPATIAL BASELINE (2050, 24H)
# Original L4-style setup with 24h aggregation
# ==========================================

run:
  name: "L4-full-spatial-24h-baseline"
  disable_progressbar: true
  shared_resources:
    policy: false

scenario:
  # Full/original L4 spatial resolution (as used in c96 runs)
  clusters: [96]
  # Keep Co2L for consistency with L1/L3 workflow usage.
  # In sector-coupled runs, the 2050 net-zero target is also governed by `co2_budget`.
  opts: ['Co2L']
  # Keep daily aggregation to reduce runtime vs. fully hourly L4.
  sector_opts: ['24h']
  planning_horizons: [2050]

countries:
  ['AL','AT','BA','BE','BG','CH','CZ','DE','DK','EE','ES','FI','FR','GB','GR',
   'HR','HU','IE','IT','LT','LU','LV','ME','MD','MK','NL','NO','PL','PT',
   'RO','RS','SE','SI','SK','UA','XK']

# Full year in this repo uses an exclusive right bound (`inclusive: left`)
snapshots:
  start: "2019-01-01"
  end: "2020-01-01"
  inclusive: "left"

# Use a recent weather year cutout instead of the archived 2013 cutout.
atlite:
  default_cutout: "europe-2019-era5"
  cutouts:
    "europe-2019-era5":
      module: era5
      x: [-12.0, 42.0]
      y: [33.0, 72.0]
      dx: 0.3
      dy: 0.3
      time: ["2019", "2019"]
      chunks:
        time: 500
      prepare_kwargs:
        monthly_requests: true
        tmpdir: ./cutouts_tmp/

electricity:
  co2limit_enable: true
  co2limit: 0

  extendable_carriers:
    Generator: [solar, onwind, offwind-ac, offwind-dc, OCGT, CCGT, biomass]
    StorageUnit: [battery]
    Store: [H2]
    # `Link` here is for extendable H2 pipelines only in this fork.
    Link: []

sector:
  biomass: true
  industry: true
  dac: true
  # Baseline (Scenario 0): no policy-backed CDR subsidy.
  # Keep explicit to avoid relying on defaults.
  cdr_credit_price: 0.0
  # Eligibility-aware scope for future policy scenarios (S1-S3).
  # With price=0 this has no numerical effect, but keeps the setup consistent.
  cdr_credit_scope: ["dac", "biogenic"]
  co2_vent: false
  co2_spatial: true
  # Keep CO2 transport network enabled for thesis-consistent system representation.
  co2_network: true
  co2_network_cost_factor: 1.0
  cc_fraction: 0.9

  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25

  co2_sequestration_cost: 20
  co2_sequestration_lifetime: 50

lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false

solving:
  solver:
    name: gurobi
    options: gurobi-default

  solver_options:
    gurobi-default:
      threads: 8
      method: 2
      crossover: 0
      NumericFocus: 1
      BarConvTol: 1.0e-6
      FeasibilityTol: 1.0e-6

data:
  cutout:
    source: build
    version: unknown
  wdpa:
    source: primary
    version: latest
  wdpa_marine:
    source: primary
    version: latest
