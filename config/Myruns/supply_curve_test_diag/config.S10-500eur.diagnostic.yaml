run:
  name: S10t-cdr-500eur-168seg
  disable_progressbar: true
  use_shadow_directory: false
  shared_resources:
    policy: false
foresight: myopic
scenario:
  clusters:
  - 96
  opts:
  - ''
  sector_opts:
  - 168seg
  planning_horizons:
  - 2030
  - 2040
  - 2050
countries:
- AL
- AT
- BA
- BE
- BG
- CH
- CZ
- DE
- DK
- EE
- ES
- FI
- FR
- GB
- GR
- HR
- HU
- IE
- IT
- LT
- LU
- LV
- ME
- MD
- MK
- NL
- 'NO'
- PL
- PT
- RO
- RS
- SE
- SI
- SK
- UA
- XK
snapshots:
  start: '2019-01-01'
  end: '2020-01-01'
  inclusive: left
atlite:
  default_cutout: europe-2019-era5
  cutouts:
    europe-2019-era5:
      module: era5
      x:
      - -12.0
      - 42.0
      y:
      - 33.0
      - 72.0
      dx: 0.3
      dy: 0.3
      time:
      - '2019'
      - '2019'
      chunks:
        time: 500
      prepare_kwargs:
        monthly_requests: true
        tmpdir: ./cutouts_tmp/
electricity:
  co2limit_enable: false
  transmission_limit: c1.5
  extendable_carriers:
    Generator:
    - nuclear
    - solar
    - solar-hsat
    - onwind
    - offwind-ac
    - offwind-dc
    - offwind-float
    - OCGT
    - CCGT
    - biomass
    StorageUnit:
    - battery
    Store:
    - H2
    Link: []
  conventional_carriers:
  - oil
  - OCGT
  - CCGT
  - coal
  - lignite
  - geothermal
  - biomass
  renewable_carriers:
  - solar
  - solar-hsat
  - onwind
  - offwind-ac
  - offwind-dc
  - offwind-float
  - hydro
  estimate_renewable_capacities:
    enable: true
    from_gem: true
    year: 2020
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar
conventional:
  unit_commitment: false
  dynamic_fuel_price: true
  fuel_price_rolling_window: 6
  nuclear:
    p_max_pu: data/nuclear_p_max_pu.csv
  biomass:
    p_max_pu: 0.65
sector:
  biomass: true
  biomass_transport: true
  industry: true
  dac: true
  dac_variants:
    enable: true
    variants:
      liquid:
        carrier_name: DAC-liquidHT
        cost_technology: direct air capture - liquid
      solid:
        carrier_name: DAC-solidLT
        cost_technology: direct air capture - solid
      electrochemical:
        carrier_name: DAC-electrochemical
        cost_technology: direct air capture - electrochemical
  dac_weather_factors:
    enable: true
    file: data/dac_country_weather_factors.csv
  cdr_credit_scope:
  - dac
  - biogenic
  cdr_credit_limit_by_year:
    2030: 100
    2040: 300
    2050: 500
  cdr_credit_prices_by_scope:
    dac:
      2025: 500
      2030: 500
      2040: 500
      2050: 500
    biogenic:
      2025: 500
      2030: 500
      2040: 500
      2050: 500
  co2_vent: false
  co2_spatial: true
  co2_network: true
  co2_network_cost_factor:
    2030: 5.0
    2040: 3.0
    2050: 1.5
  cc_fraction: 0.9
  cdr_credit_timing: sequestration
  cdr_credit_standalone: true
  co2_sequestration_potential:
    2025: 50
    2030: 150
    2035: 275
    2040: 400
    2045: 700
    2050: 1000
  solid_biomass_potential_factor: 0.75
  limit_max_growth:
    enable: true
    factor: 1.3
    max_growth:
      onwind: 16
      solar: 28
      solar-hsat: 7
      solar rooftop: 15
      offwind-ac: 35
      offwind-dc: 35
      process emissions CC: 0.18
      SMR CC: 0.39
      urban central gas CHP CC: 0.25
    max_relative_growth:
      onwind: 3
      solar: 3
      solar-hsat: 3
      solar rooftop: 3
      offwind-ac: 3
      offwind-dc: 3
  allam_cycle_gas: false
  enhanced_geothermal:
    enable: false
  regional_co2_sequestration_potential:
    enable: true
    attribute:
    - conservative estimate Mt
    - conservative estimate GAS Mt
    - conservative estimate OIL Mt
    - conservative estimate aquifer Mt
    include_onshore: false
    min_size: 3
    max_size: 25
    years_of_storage: 25
  co2_sequestration_cost: 20
  co2_sequestration_cost_by_country:
    AL: 12
    BE: 7
    BG: 13
    DE: 8
    DK: 6
    EE: 13
    ES: 10
    FI: 12
    FR: 9
    GB: 6
    HR: 11
    IE: 8
    IT: 10
    LT: 13
    LV: 13
    ME: 12
    NL: 6
    'NO': 5
    PL: 11
    PT: 11
    RO: 12
    SE: 10
    UA: 12
  co2_sequestration_lifetime: 50
co2_budget: null
clustering:
  temporal:
    resolution_elec: false
    resolution_sector: 168seg
lines:
  reconnect_crimea: true
  dynamic_line_rating:
    activate: false
costs:
  overwrites:
    compression-electricity-input:
      biomass CHP capture: 0.16
    electricity-input:
      biomass CHP capture: 0.025
  emission_prices:
    enable: true
    dynamic: false
    co2:
      2030: 119
      2040: 279
      2050: 463
solving:
  options:
    io_api: mps
    diagnostic_slacks:
      enable: true
      penalty: 1000000000.0
      tolerance: 1.0e-06
      groups:
      - global
      - cdr
      - biomass
      - stores
      - load_balance
      - imports
      - growth
  agg_p_nom_limits:
    agg_offwind: false
    agg_solar: false
    include_existing: false
    file: config/Myruns/supply_curve_v2/nuclear_p_nom_limits.csv
  constraints:
    CCL: true
    EQ: false
    BAU: false
    SAFE: false
  solver:
    name: gurobi
    options: gurobi-default
  solver_options:
    gurobi-default:
      threads: 8
      method: 2
      crossover: 0
      NumericFocus: 3
      BarHomogeneous: 1
      DualReductions: 0
      InfUnbdInfo: 1
      ScaleFlag: 2
      ObjScale: -0.5
      BarConvTol: 1.0e-05
      FeasibilityTol: 1.0e-05
      OptimalityTol: 1.0e-05
      Seed: 123
      GURO_PAR_BARDENSETHRESH: 200
      TimeLimit: 21600
data:
  cutout:
    source: build
    version: unknown
  wdpa:
    source: archive
    version: latest
  wdpa_marine:
    source: archive
    version: latest
